<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>슬라이드쇼 갤러리</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1>📸 슬라이드쇼 갤러리</h1>
      <p class="header-sub">디렉토리별 이미지 슬라이드쇼</p>
    </div>
  </header>

  <main class="main-content">
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>로딩 중...</p>
    </div>
    <div id="error" class="error-msg" style="display:none">
      <p>슬라이드쇼를 불러올 수 없습니다.</p>
      <small>slides/manifest.json 파일을 확인하세요.</small>
    </div>
    <div id="gallery" class="gallery" style="display:none"></div>
  </main>

  <footer class="site-footer">
    <p>이미지를 slides/ 폴더에 추가하고 <code>python generate_manifest.py</code>를 실행하세요.</p>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
